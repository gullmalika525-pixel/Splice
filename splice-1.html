<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Splice — one take, every cut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1815;
    --ink-2:#242019;
    --paper:#F3ECDF;
    --paper-2:#EAE1CD;
    --brass:#C08A3E;
    --brass-dark:#A87530;
    --rust:#B5482E;
    --ink-text:#221D17;
    --bone:#EFE8DB;
    --bone-dim:#B8AE9C;
    --bone-dimmer:#8A8068;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--bone);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:880px;
    margin:0 auto;
    padding:32px 24px 80px;
  }
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:56px;
  }
  .logo{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    letter-spacing:0.22em;
    color:var(--bone);
    font-weight:500;
  }
  .pill{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:0.12em;
    color:var(--bone-dim);
    border:1px solid var(--bone-dimmer);
    border-radius:999px;
    padding:5px 12px;
    text-transform:uppercase;
  }
  .hero{
    margin-bottom:48px;
    animation:rise 0.7s ease-out both;
  }
  .hero h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(40px,7vw,64px);
    line-height:1.02;
    margin:0 0 18px;
  }
  .hero h1 em{
    font-style:italic;
    font-weight:500;
    color:var(--brass);
  }
  .hero p{
    font-size:16px;
    color:var(--bone-dim);
    max-width:480px;
    line-height:1.5;
    margin:0;
  }
  .panel{
    background:var(--paper);
    border-radius:4px;
    padding:28px;
    box-shadow:0 20px 50px -20px rgba(0,0,0,0.55);
    animation:rise 0.7s ease-out 0.1s both;
  }
  .panel-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--rust);
    font-weight:500;
    margin-bottom:14px;
  }
  textarea{
    width:100%;
    min-height:160px;
    border:none;
    background:transparent;
    color:var(--ink-text);
    font-family:'Inter',sans-serif;
    font-size:15px;
    line-height:1.55;
    resize:vertical;
    outline:none;
    padding:0;
  }
  textarea::placeholder{color:#9A8F78;}
  textarea:focus-visible{outline:2px solid var(--brass-dark); outline-offset:6px; border-radius:2px;}
  .panel-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:14px;
    margin-top:18px;
    padding-top:18px;
    border-top:1px solid rgba(34,29,23,0.12);
  }
  .chips{display:flex; gap:8px; flex-wrap:wrap;}
  .chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    border:1px solid rgba(34,29,23,0.3);
    background:transparent;
    color:var(--ink-text);
    border-radius:999px;
    padding:7px 13px;
    cursor:pointer;
    transition:background 0.15s, color 0.15s, border-color 0.15s;
  }
  .chip[aria-pressed="true"]{
    background:var(--brass-dark);
    border-color:var(--brass-dark);
    color:var(--paper);
  }
  .chip:focus-visible{outline:2px solid var(--rust); outline-offset:2px;}
  .right-controls{display:flex; align-items:center; gap:16px;}
  .charcount{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:#9A8F78;
  }
  .splice-btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    font-weight:500;
    background:var(--brass);
    color:var(--ink-text);
    border:none;
    border-radius:4px;
    padding:11px 20px;
    cursor:pointer;
    transition:background 0.15s, transform 0.1s;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .splice-btn:hover:not(:disabled){background:var(--brass-dark);}
  .splice-btn:active:not(:disabled){transform:translateY(1px);}
  .splice-btn:disabled{opacity:0.5; cursor:not-allowed;}
  .splice-btn:focus-visible{outline:2px solid var(--bone); outline-offset:2px;}
  .hint{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--rust);
    margin-top:10px;
    min-height:14px;
  }
  .divider{
    display:flex;
    align-items:center;
    gap:14px;
    margin:44px 0;
    color:var(--bone-dim);
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
  }
  .divider::before, .divider::after{
    content:'';
    flex:1;
    border-top:1px dashed var(--bone-dimmer);
  }
  .out-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--bone-dim);
    margin-bottom:18px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
    gap:20px;
  }
  .card{
    position:relative;
    background:var(--paper-2);
    border-radius:3px;
    padding:26px 20px 18px;
    color:var(--ink-text);
    animation:rise 0.5s ease-out both;
  }
  .card.empty{
    border:1px dashed var(--bone-dimmer);
    background:transparent;
    color:var(--bone-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:140px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:0.05em;
    text-align:center;
  }
  .tab{
    position:absolute;
    top:-11px;
    left:16px;
    background:var(--brass-dark);
    color:var(--paper);
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:4px 10px;
    border-radius:2px;
    transform:rotate(-1.2deg);
  }
  .card p{
    font-size:14.5px;
    line-height:1.6;
    white-space:pre-wrap;
    margin:6px 0 14px;
  }
  .card-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--bone-dimmer);
  }
  .copy-btn{
    background:none;
    border:none;
    color:var(--rust);
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    cursor:pointer;
    padding:2px;
  }
  .copy-btn:hover{text-decoration:underline;}
  .copy-btn:focus-visible{outline:2px solid var(--rust); outline-offset:2px;}
  .error-banner{
    border-left:3px solid var(--rust);
    background:rgba(181,72,46,0.15);
    padding:12px 16px;
    font-size:13px;
    margin-bottom:24px;
    line-height:1.5;
  }
  .error-banner b{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--rust);
    display:block;
    margin-bottom:4px;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
  @media (max-width:520px){
    .panel-footer{align-items:flex-start;}
    .right-controls{width:100%; justify-content:space-between;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="logo">SPLICE</div>
    <div class="pill">AI content repurposing</div>
  </div>

  <div class="hero">
    <h1>One take.<br><em>Every cut.</em></h1>
    <p>Paste your long-form content once. Splice it into the posts you actually need to publish — tweet, LinkedIn, caption, newsletter.</p>
  </div>

  <div class="panel">
    <div class="panel-label">The take</div>
    <textarea id="sourceInput" placeholder="Paste your blog post, video transcript, or voice note here…"></textarea>
    <div class="panel-footer">
      <div class="chips" id="chipRow"></div>
      <div class="right-controls">
        <span class="charcount" id="inputCount">0 characters</span>
        <button class="splice-btn" id="spliceBtn">
          <span id="btnLabel">Splice it</span>
        </button>
      </div>
    </div>
    <div class="hint" id="hint"></div>
  </div>

  <div class="divider">✂ cut here</div>

  <div id="errorZone"></div>

  <div class="out-label">The cuts</div>
  <div class="grid" id="outputGrid">
    <div class="card empty">Awaiting your take.<br>Paste content above and hit Splice.</div>
  </div>

</div>

<script>
  const FORMATS = [
    { key:'tweet',      label:'Tweet',      limit:280 },
    { key:'linkedin',   label:'LinkedIn',   limit:null },
    { key:'caption',    label:'Caption',    limit:null },
    { key:'newsletter', label:'Newsletter', limit:null },
  ];

  const chipRow = document.getElementById('chipRow');
  const sourceInput = document.getElementById('sourceInput');
  const inputCount = document.getElementById('inputCount');
  const spliceBtn = document.getElementById('spliceBtn');
  const btnLabel = document.getElementById('btnLabel');
  const hint = document.getElementById('hint');
  const outputGrid = document.getElementById('outputGrid');
  const errorZone = document.getElementById('errorZone');

  FORMATS.forEach(f => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.type = 'button';
    chip.setAttribute('aria-pressed', 'true');
    chip.textContent = f.label;
    chip.dataset.key = f.key;
    chip.addEventListener('click', () => {
      const pressed = chip.getAttribute('aria-pressed') === 'true';
      chip.setAttribute('aria-pressed', pressed ? 'false' : 'true');
    });
    chipRow.appendChild(chip);
  });

  sourceInput.addEventListener('input', () => {
    inputCount.textContent = `${sourceInput.value.length} characters`;
  });

  function selectedFormats(){
    return [...chipRow.querySelectorAll('.chip')]
      .filter(c => c.getAttribute('aria-pressed') === 'true')
      .map(c => FORMATS.find(f => f.key === c.dataset.key));
  }

  function setLoading(isLoading){
    spliceBtn.disabled = isLoading;
    btnLabel.textContent = isLoading ? 'Splicing…' : 'Splice it';
  }

  function showError(message){
    errorZone.innerHTML = `<div class="error-banner"><b>The reel jammed</b>${message}</div>`;
  }

  function clearError(){ errorZone.innerHTML = ''; }

  function renderEmpty(){
    outputGrid.innerHTML = `<div class="card empty">Awaiting your take.<br>Paste content above and hit Splice.</div>`;
  }

  function renderCards(result, formats){
    outputGrid.innerHTML = '';
    formats.forEach((f, i) => {
      const text = (result[f.key] || '').trim();
      if(!text) return;
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.06}s`;
      const num = String(i+1).padStart(2,'0');
      const limitNote = f.limit ? ` · limit ${f.limit}` : '';
      card.innerHTML = `
        <div class="tab">${num} — ${f.label}</div>
        <p>${escapeHtml(text)}</p>
        <div class="card-footer">
          <span>${text.length} chars${limitNote}</span>
          <button class="copy-btn" type="button">Copy this cut</button>
        </div>
      `;
      card.querySelector('.copy-btn').addEventListener('click', (e) => {
        navigator.clipboard.writeText(text);
        const btn = e.target;
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = original; }, 1400);
      });
      outputGrid.appendChild(card);
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function handleSplice(){
    clearError();
    const text = sourceInput.value.trim();
    const formats = selectedFormats();

    if(text.length < 40){
      hint.textContent = 'Paste at least a paragraph — give it something to cut.';
      return;
    }
    if(formats.length === 0){
      hint.textContent = 'Select at least one format to cut.';
      return;
    }
    hint.textContent = '';
    setLoading(true);

    const systemPrompt = `You are an expert content repurposing assistant. You take one piece of long-form content and rewrite it into short-form formats, in the original author's voice. Repurpose it into ONLY the formats listed below. Respond with ONLY a single valid JSON object — no markdown formatting, no code fences, no commentary before or after. Keys must be exactly the provided format keys, values must be plain strings.

Format rules:
- tweet: under 280 characters total, punchy, no forced hashtags.
- linkedin: 120-200 words, professional but conversational, line breaks welcome, at most 2-3 relevant hashtags at the end.
- caption: 1-3 short sentences, casual, suitable for Instagram or TikTok, 1-2 relevant emoji allowed.
- newsletter: 3-5 sentences, a teaser blurb for an email newsletter, ending on a soft call-to-action.`;

    const userMessage = `Source content:\n"""\n${text}\n"""\n\nRepurpose this into the following formats: ${formats.map(f=>f.key).join(', ')}.`;

    try{
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: userMessage }]
        })
      });

      if(!response.ok){
        throw new Error(`API responded with status ${response.status}`);
      }

      const data = await response.json();
      const rawText = (data.content || [])
        .map(block => block.text || '')
        .join('\n')
        .trim();

      const cleaned = rawText.replace(/^```json/i, '').replace(/^```/,'').replace(/```$/,'').trim();
      const parsed = JSON.parse(cleaned);

      renderCards(parsed, formats);

    }catch(err){
      console.error(err);
      showError(`Couldn't splice that take. ${err.message || 'Try again in a moment.'}`);
      renderEmpty();
    }finally{
      setLoading(false);
    }
  }

  spliceBtn.addEventListener('click', handleSplice);
</script>
</body>
</html>
